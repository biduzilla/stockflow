spring:
  application:
    name: ms-config
  profiles:
    active: git
  cloud:
    config:
      server:
        uri: "https://github.com/biduzilla/stockflow.git"
        search-paths: "ms-config/src/main/resources/config"
        default-label: main
        timeout: 5
        clone-on-start: true
        force-pull: true

server:
  port: 8071
